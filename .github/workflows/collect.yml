name: Collect Fan Data

on:
  schedule:
    # 2:00 JST = 17:00 UTC前日
    - cron: '0 17 * * *'
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect data
        run: python scripts/collect.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "📊 $(TZ=Asia/Tokyo date +%Y-%m-%d) fan data" && git push)
