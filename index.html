<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>観測は続く。</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css?v=0.5.8">
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-title-row">
      <h1 class="header-title"><span class="h1-lead">観</span>測は<span class="h1-lead accent">続</span><span class="accent">く。</span></h1>
      <a href="manual.html" class="header-help">使い方</a>
    </div>
    <p class="header-sub">昨日、あなたに会いに来た人。</p>
    <div class="header-meta">
      <span id="creatorName">--</span> / <span id="followerCount">--</span> followers
      <br class="meta-break"><span class="meta-updated">updated: <span id="lastUpdate">--</span></span>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-bar-btn active" data-tab="today">Today</button>
    <button class="tab-bar-btn" data-tab="fans">Fans</button>
    <button class="tab-bar-btn" data-tab="ranking">Ranking</button>
    <button class="tab-bar-btn" data-tab="magazines">Magazines</button>
  </div>

  <!-- Today Tab -->
  <div class="tab-content active" id="tabToday">
    <div class="container">
      <div id="todayContent"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- Fans Tab -->
  <div class="tab-content" id="tabFans">
    <div class="container">
      <div id="fansContent"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- Ranking Tab -->
  <div class="tab-content" id="tabRanking">
    <div class="container">
      <div class="ranking-header">
        <div class="ranking-tagline">深く関わってくれた人が、上位に。</div>
      </div>
      <div id="rankingContent"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- Magazines Tab -->
  <div class="tab-content" id="tabMagazines">
    <div class="container">
      <div class="magazines-header">
        <div class="magazines-tagline">マガジンに追加してくれた人。</div>
        <div class="magazines-rule">あなたの記事を自分のマガジンに追加してくれた人を、あとから追いかけられます。</div>
      </div>
      <div id="magazinesContent"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-copy">&copy; おはようカノジョ / hasyamo</div>
    <div class="footer-version">v0.5.8</div>
  </footer>
</div>

<!-- Suki Screenshot Modal -->
<div id="sukiScreenshotModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeScreenshot()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeScreenshot()">&times;</button>
    <div id="sukiScreenshotContent"></div>
  </div>
</div>

<!-- Version Update Modal -->
<div id="updateModal" class="modal-overlay" style="display:none">
  <div class="modal-content update-modal-content">
    <div class="update-modal-title">アップデート</div>
    <div id="updateVersion" class="update-modal-version"></div>
    <ul id="updateBody" class="update-modal-body"></ul>
    <button id="updateCloseBtn" class="update-modal-btn">OK</button>
  </div>
</div>

<script src="app.js?v=0.5.8"></script>
</body>
</html>
